<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%" role="img" aria-labelledby="favicon-title">
  <title id="favicon-title">CloseLinkit Favicon</title>
  
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007CF0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00DFD8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7928CA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF0080;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g transform="translate(50, 50)" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Eslabón izquierdo -->
    <path d="M 120 75 L 75 75 C 33.57 75 0 108.57 0 150 C 0 191.43 33.57 225 75 225 L 120 225" stroke="url(#gradBlue)" />
    <!-- Eslabón derecho -->
    <path d="M 180 75 L 225 75 C 266.43 75 300 108.57 300 150 C 300 191.43 266.43 225 225 225 L 180 225" stroke="url(#gradPurple)" />
    <!-- Conexión central adaptativa -->
    <line x1="85" y1="150" x2="215" y2="150" stroke="#888888" stroke-width="35" />
  </g>
</svg>
