services:
  postgres-db:
    image: postgres:18.4
    container_name: postgresql
    restart: unless-stopped
    shm_size: 2252mb
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=America/Chihuahua
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - pg_data_CloseLinkit:/var/lib/postgresql

    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "log_statement=all"

volumes:
  pg_data_CloseLinkit:
